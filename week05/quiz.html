<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Quiz</title>

    <meta name="description" content="A quiz about HTML and CSS concepts.">
    <meta name="author" content="Helaena Hales">

    <link rel="stylesheet" href="../styles/quiz.css">
</head>

<body>

    <h1>HTML & CSS Quiz</h1>

    <form>

        <!-- Question 1 -->
        <label for="q1">1. What does HTML stand for?</label>
        <input type="text" id="q1" name="q1">

        <!-- Question 2 -->
        <label for="q2">2. Explain what CSS is used for:</label>
        <textarea id="q2" name="q2" rows="4"></textarea>

        <!-- Question 3 -->
        <label for="q3">3. Which is a CSS layout method?</label>
        <select id="q3" name="q3">
            <option value="" selected disabled>Choose One...</option>
            <option value="flexbox">Flexbox</option>
            <option value="grid">Grid</option>
            <option value="both">Both Flexbox and Grid</option>
        </select>

        <!-- Question 4 -->
        <label for="q4">4. How many heading levels are in HTML?</label>
        <input type="number" id="q4" name="q4">

        <!-- Submit Button -->
        <button type="submit">Submit Quiz</button>

    </form>

</body>

</html>
